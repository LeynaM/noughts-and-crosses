<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe Multiplayer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
        }

        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 10px;
            font-size: 2rem;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 0.9rem;
        }

        /* Connection Section */
        .connection-section {
            margin-bottom: 30px;
        }

        .input-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 500;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }

        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 20px;
        }

        button {
            padding: 14px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        button:hover:not(:disabled) {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        button.secondary {
            background: #6c757d;
        }

        button.secondary:hover:not(:disabled) {
            background: #5a6268;
        }

        /* Status */
        .status {
            text-align: center;
            padding: 15px;
            background: #f0f0f0;
            border-radius: 10px;
            margin-bottom: 20px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .status.connected {
            background: #d4edda;
            color: #155724;
        }

        .status.waiting {
            background: #fff3cd;
            color: #856404;
        }

        .status.playing {
            background: #d1ecf1;
            color: #0c5460;
        }

        .status.winner {
            background: #d4edda;
            color: #155724;
            font-size: 1.2rem;
        }

        .status.loser {
            background: #f8d7da;
            color: #721c24;
        }

        /* Game ID Display */
        .game-id-display {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
        }

        .game-id-display .label {
            font-size: 0.85rem;
            color: #666;
            margin-bottom: 5px;
        }

        .game-id-display .id {
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            color: #333;
            font-weight: 600;
            word-break: break-all;
            padding: 8px;
            background: white;
            border-radius: 4px;
            margin: 8px 0;
        }

        .game-id-display button {
            margin-top: 5px;
            padding: 8px 16px;
            font-size: 0.9rem;
        }

        /* Player Info */
        .player-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        .player {
            font-weight: 600;
            padding: 8px 12px;
            border-radius: 6px;
            transition: all 0.3s;
        }

        .player.active {
            background: #667eea;
            color: white;
            transform: scale(1.05);
        }

        .player-x {
            color: #e74c3c;
        }

        .player-o {
            color: #3498db;
        }

        /* Game Board - Proper Grid Style */
        .board-container {
            margin-bottom: 20px;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0;
            margin: 0 auto;
            max-width: 400px;
            background: #2c3e50;
            padding: 4px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
        }

        .cell {
            aspect-ratio: 1;
            background: white;
            font-size: 4rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            user-select: none;
            position: relative;
        }

        /* Create grid lines by using borders */
        .cell:nth-child(1),
        .cell:nth-child(2),
        .cell:nth-child(3) {
            border-bottom: 4px solid #2c3e50;
        }

        .cell:nth-child(4),
        .cell:nth-child(5),
        .cell:nth-child(6) {
            border-bottom: 4px solid #2c3e50;
        }

        .cell:nth-child(1),
        .cell:nth-child(4),
        .cell:nth-child(7) {
            border-right: 4px solid #2c3e50;
        }

        .cell:nth-child(2),
        .cell:nth-child(5),
        .cell:nth-child(8) {
            border-right: 4px solid #2c3e50;
        }

        /* Round corners for outer cells */
        .cell:nth-child(1) {
            border-top-left-radius: 8px;
        }

        .cell:nth-child(3) {
            border-top-right-radius: 8px;
        }

        .cell:nth-child(7) {
            border-bottom-left-radius: 8px;
        }

        .cell:nth-child(9) {
            border-bottom-right-radius: 8px;
        }

        .cell:hover:not(.occupied):not(.disabled) {
            background: #f0f8ff;
        }

        .cell.occupied {
            cursor: not-allowed;
        }

        .cell.disabled {
            cursor: not-allowed;
        }

        .cell.x {
            color: #e74c3c;
            animation: popIn 0.3s ease;
        }

        .cell.o {
            color: #3498db;
            animation: popIn 0.3s ease;
        }

        @keyframes popIn {
            0% {
                transform: scale(0);
            }

            50% {
                transform: scale(1.1);
            }

            100% {
                transform: scale(1);
            }
        }

        /* Hidden */
        .hidden {
            display: none !important;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 1.5rem;
            }

            .cell {
                font-size: 2.5rem;
            }

            .button-group {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Noughts and Crosses</h1>

        <!-- Connection Section -->
        <div id="connectionSection" class="connection-section">
            <div class="input-group">
                <label for="username">Your Name</label>
                <input type="text" id="username" placeholder="Enter your name" value="">
            </div>

            <div id="createGameSection">
                <div class="button-group">
                    <button onclick="createGame()">Create New Game</button>
                    <button onclick="showJoinGame()" class="secondary">🔗 Join Game</button>
                </div>
            </div>

            <div id="joinGameSection" class="hidden">
                <div class="input-group">
                    <label for="gameId">Game ID</label>
                    <input type="text" id="gameId" placeholder="Paste game ID here">
                </div>
                <div class="button-group">
                    <button onclick="joinGame()">Join Game</button>
                    <button onclick="showCreateGame()" class="secondary">← Back</button>
                </div>
            </div>
        </div>

        <!-- Game Section (Hidden initially) -->
        <div id="gameSection" class="hidden">
            <!-- Game ID Display -->
            <div id="gameIdDisplay" class="game-id-display">
                <div class="label">Share this Game ID with your opponent:</div>
                <div class="id" id="displayGameId"></div>
                <button onclick="copyGameId()">Copy Game ID</button>
            </div>

            <!-- Status -->
            <div id="status" class="status">Connecting...</div>

            <!-- Player Info -->
            <div id="playerInfo" class="player-info hidden">
                <div id="playerX" class="player">
                    <span class="player-x">❌</span> <span id="playerXName">Waiting...</span>
                </div>
                <div id="playerO" class="player">
                    <span class="player-o">⭕</span> <span id="playerOName">Waiting...</span>
                </div>
            </div>

            <!-- Game Board -->
            <div class="board-container">
                <div class="board" id="board">
                    <div class="cell" onclick="makeMove(0, 0)"></div>
                    <div class="cell" onclick="makeMove(0, 1)"></div>
                    <div class="cell" onclick="makeMove(0, 2)"></div>
                    <div class="cell" onclick="makeMove(1, 0)"></div>
                    <div class="cell" onclick="makeMove(1, 1)"></div>
                    <div class="cell" onclick="makeMove(1, 2)"></div>
                    <div class="cell" onclick="makeMove(2, 0)"></div>
                    <div class="cell" onclick="makeMove(2, 1)"></div>
                    <div class="cell" onclick="makeMove(2, 2)"></div>
                </div>
            </div>

            <!-- New Game Button -->
            <button id="newGameBtn" class="hidden" onclick="newGame()" style="width: 100%;">
                New Game
            </button>
        </div>
    </div>

    <script>
        // Global state
        let ws = null;
        let myRole = null;
        let currentGame = null;
        let myUsername = '';
        let currentGameId = null;

        // Show join game section
        function showJoinGame() {
            document.getElementById('createGameSection').classList.add('hidden');
            document.getElementById('joinGameSection').classList.remove('hidden');
            document.getElementById('gameId').focus();
        }

        // Show create game section
        function showCreateGame() {
            document.getElementById('joinGameSection').classList.add('hidden');
            document.getElementById('createGameSection').classList.remove('hidden');
        }

        // Create new game
        async function createGame() {
            myUsername = document.getElementById('username').value.trim();
            if (!myUsername) {
                alert('Please enter your name');
                return;
            }

            try {
                // Create game via REST API
                const response = await fetch(`http://127.0.0.1:8000/games`, {
                    method: 'POST'
                });

                if (!response.ok) {
                    throw new Error('Failed to create game');
                }

                const data = await response.json();
                currentGameId = data.game_id;

                // Show game section
                document.getElementById('connectionSection').classList.add('hidden');
                document.getElementById('gameSection').classList.remove('hidden');
                document.getElementById('displayGameId').textContent = currentGameId;

                // Connect to WebSocket
                connectToGame(currentGameId);
            } catch (error) {
                console.error('Error creating game:', error);
                alert('Failed to create game. Make sure the server is running on localhost:8000');
            }
        }

        // Join existing game
        function joinGame() {
            myUsername = document.getElementById('username').value.trim();
            const gameId = document.getElementById('gameId').value.trim();

            if (!myUsername) {
                alert('Please enter your name');
                return;
            }

            if (!gameId) {
                alert('Please enter a game ID');
                return;
            }

            currentGameId = gameId;

            // Show game section
            document.getElementById('connectionSection').classList.add('hidden');
            document.getElementById('gameSection').classList.remove('hidden');
            document.getElementById('displayGameId').textContent = currentGameId;

            // Connect to WebSocket
            connectToGame(currentGameId);
        }

        // Connect to WebSocket for a specific game
        function connectToGame(gameId) {
            updateStatus('Connecting...', 'waiting');
            const wsUrl = `ws://127.0.0.1:8000/ws/game/${gameId}?username=${encodeURIComponent(myUsername)}`;
            ws = new WebSocket(wsUrl);

            ws.onopen = () => {
                console.log('✅ Connected to game');
                updateStatus('Connected! Waiting for opponent...', 'connected');
            };

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                console.log('📨 Received:', data);
                handleMessage(data);
            };

            ws.onerror = (error) => {
                console.error('❌ WebSocket error:', error);
                updateStatus('Connection error - Check if server is running', 'loser');
            };

            ws.onclose = () => {
                console.log('Connection closed');
                updateStatus('Disconnected', 'loser');
                document.getElementById('newGameBtn').classList.remove('hidden');
            };
        }

        // Handle incoming messages
        function handleMessage(data) {
            switch (data.type) {
                case 'game_joined':
                    myRole = data.your_role;
                    currentGame = data.game;
                    updateStatus(`You are Player ${myRole}. Waiting for opponent...`, 'waiting');
                    renderGame(data.game);
                    break;

                case 'player_joined':
                    currentGame = data.game;
                    updateStatus('Opponent joined! Game starting...', 'playing');
                    renderGame(data.game);
                    break;

                case 'move_made':
                    currentGame = data.game;
                    renderGame(data.game);
                    updateGameStatus(data.game);
                    break;

                case 'game_ended':
                    currentGame = data.game;
                    renderGame(data.game);
                    handleGameEnd(data);
                    break;

                case 'player_disconnected':
                    updateStatus('Opponent disconnected', 'waiting');
                    break;

                case 'player_reconnected':
                    updateStatus('Opponent reconnected!', 'playing');
                    break;

                case 'error':
                    alert('Error: ' + data.message);
                    break;
            }
        }

        // Render game state
        function renderGame(game) {
            const cells = document.querySelectorAll('.cell');
            cells.forEach((cell, index) => {
                const row = Math.floor(index / 3);
                const col = index % 3;
                const value = game.board[row][col];

                cell.textContent = value || '';
                cell.className = 'cell';

                if (value) {
                    cell.classList.add('occupied');
                    cell.classList.add(value.toLowerCase());
                }

                // Disable if not my turn or game over
                if (game.status !== 'in_progress' || game.current_player !== myRole) {
                    cell.classList.add('disabled');
                }
            });

            // Update player info
            document.getElementById('playerInfo').classList.remove('hidden');

            if (game.player_x) {
                document.getElementById('playerXName').textContent = game.player_x.username;
                document.getElementById('playerX').classList.toggle('active', game.current_player === 'X');
            }

            if (game.player_o) {
                document.getElementById('playerOName').textContent = game.player_o.username;
                document.getElementById('playerO').classList.toggle('active', game.current_player === 'O');
            }
        }

        // Update game status message
        function updateGameStatus(game) {
            if (game.status === 'in_progress') {
                const isMyTurn = game.current_player === myRole;
                updateStatus(isMyTurn ? 'Your turn!' : 'Opponent\'s turn...', 'playing');
            }
        }

        // Handle game end
        function handleGameEnd(data) {
            const winner = data.winner;
            let message = '';
            let statusClass = '';

            if (winner === myRole) {
                message = '🎉 You Won!';
                statusClass = 'winner';
            } else if (winner) {
                message = '😔 You Lost';
                statusClass = 'loser';
            } else {
                message = '🤝 Draw!';
                statusClass = 'playing';
            }

            updateStatus(message, statusClass);
            document.getElementById('newGameBtn').classList.remove('hidden');
        }

        // Make a move
        function makeMove(row, col) {
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                console.log('Not connected');
                return;
            }

            if (!currentGame || currentGame.status !== 'in_progress') {
                console.log('Game not in progress');
                return;
            }

            if (currentGame.current_player !== myRole) {
                console.log('Not your turn');
                return;
            }

            if (currentGame.board[row][col]) {
                console.log('Cell occupied');
                return;
            }

            ws.send(JSON.stringify({
                type: 'make_move',
                position: { row, col }
            }));
        }

        // Copy game ID to clipboard
        function copyGameId() {
            const gameId = document.getElementById('displayGameId').textContent;
            navigator.clipboard.writeText(gameId).then(() => {
                const btn = event.target;
                const originalText = btn.textContent;
                btn.textContent = '✅ Copied!';
                setTimeout(() => {
                    btn.textContent = originalText;
                }, 2000);
            }).catch(err => {
                console.error('Failed to copy:', err);
                // Fallback for older browsers
                const textArea = document.createElement('textarea');
                textArea.value = gameId;
                document.body.appendChild(textArea);
                textArea.select();
                try {
                    document.execCommand('copy');
                    alert('Game ID copied to clipboard!');
                } catch (err) {
                    alert('Game ID: ' + gameId);
                }
                document.body.removeChild(textArea);
            });
        }

        // Update status display
        function updateStatus(message, statusClass = '') {
            const statusDiv = document.getElementById('status');
            statusDiv.textContent = message;
            statusDiv.className = 'status ' + statusClass;
        }

        // Start new game
        function newGame() {
            location.reload();
        }

        // Auto-focus username on load
        window.onload = () => {
            document.getElementById('username').focus();
        };
    </script>
</body>

</html>
